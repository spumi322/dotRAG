<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>dotRAG — .NET Study Assistant</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; display: flex; flex-direction: column; height: 100dvh; }
    #messages { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 0.75rem; }
    .msg { max-width: 80%; padding: 0.6rem 1rem; border-radius: 0.5rem; white-space: pre-wrap; line-height: 1.5; }
    .msg.user      { align-self: flex-end;  background: #3b82f6; color: #fff; }
    .msg.assistant { align-self: flex-start; background: #1e293b; }
    .msg.error     { align-self: flex-start; background: #7f1d1d; color: #fca5a5; }
    #controls { display: flex; gap: 0.5rem; padding: 1rem; border-top: 1px solid #1e293b; align-items: center; }
    #question { flex: 1; padding: 0.5rem 0.75rem; border-radius: 0.375rem; border: 1px solid #334155; background: #1e293b; color: #e2e8f0; font-size: 1rem; resize: none; min-height: 2.5rem; max-height: 8rem; }
    #question:focus { outline: 2px solid #3b82f6; }
    #send { padding: 0.5rem 1.25rem; background: #3b82f6; color: #fff; border: none; border-radius: 0.375rem; cursor: pointer; font-size: 1rem; }
    #send:disabled { opacity: 0.5; cursor: not-allowed; }
    #ctx-label { display: flex; align-items: center; gap: 0.35rem; font-size: 0.85rem; color: #94a3b8; cursor: pointer; white-space: nowrap; }
    #ctx-toggle { accent-color: #3b82f6; cursor: pointer; }
  </style>
</head>
<body>
<div id="messages"></div>
<div id="controls">
  <label id="ctx-label">
    <input type="checkbox" id="ctx-toggle" />
    Include context
  </label>
  <textarea id="question" rows="1" placeholder="Ask a .NET question..."></textarea>
  <button id="send">Send</button>
</div>
<script>
  const messagesEl = document.getElementById('messages');
  const questionEl = document.getElementById('question');
  const sendBtn    = document.getElementById('send');
  const ctxToggle  = document.getElementById('ctx-toggle');
  let history = [];

  function appendMessage(role, text) {
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    div.textContent = text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  async function send() {
    const question = questionEl.value.trim();
    if (!question) return;
    questionEl.value = '';
    questionEl.style.height = 'auto';
    sendBtn.disabled = true;
    appendMessage('user', question);
    const body = { question };
    if (ctxToggle.checked && history.length > 0) body.history = history;
    const thinkingEl = appendMessage('assistant', '...');
    try {
      const resp = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (!resp.ok) {
        const err = await resp.json().catch(() => ({ title: resp.statusText }));
        thinkingEl.className = 'msg error';
        thinkingEl.textContent = `Error ${resp.status}: ${err.title ?? resp.statusText}`;
        return;
      }
      const data = await resp.json();
      thinkingEl.textContent = data.answer;
      history.push({ role: 'user',      content: question    });
      history.push({ role: 'assistant', content: data.answer });
    } catch (e) {
      thinkingEl.className = 'msg error';
      thinkingEl.textContent = 'Network error: ' + e.message;
    } finally {
      sendBtn.disabled = false;
      questionEl.focus();
    }
  }

  sendBtn.addEventListener('click', send);
  questionEl.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } });
  questionEl.addEventListener('input', () => { questionEl.style.height = 'auto'; questionEl.style.height = questionEl.scrollHeight + 'px'; });
</script>
</body>
</html>
